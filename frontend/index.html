<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesforcePilot — Marriott Revenue Intelligence</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">M</div>
      <div class="brand-text">
        <span class="brand-name">SalesforcePilot</span>
        <span class="brand-sub">Marriott International</span>
      </div>
    </div>

    <div class="sidebar-section-label">Query History</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No queries yet</div>
    </div>

    <div class="sidebar-footer">
      <button class="clear-history-btn" id="clearHistoryBtn">Clear History</button>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="main">

    <header class="chat-header">
      <div class="chat-header-left">
        <h1 class="chat-title">Revenue Intelligence</h1>
        <span class="chat-subtitle">Powered by Claude AI</span>
      </div>
      <div class="chat-header-right">
        <span class="status-pill">
          <span class="status-dot"></span>Live
        </span>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome message injected by app.js -->
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="suggestion-chips" id="suggested-prompts">
        <button class="chip" data-query="Show group bookings at risk this quarter">
          Group bookings at risk
        </button>
        <button class="chip" data-query="Which properties are below revenue budget?">
          Properties below budget
        </button>
        <button class="chip" data-query="Corporate accounts not contacted in 60 days">
          Dormant accounts
        </button>
        <button class="chip" data-query="My team's sales activity this week">
          Team activity this week
        </button>
      </div>

      <div class="input-row">
        <textarea
          id="userInput"
          placeholder="Ask about group bookings, pipeline, accounts, or forecasts…"
          rows="1"
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
